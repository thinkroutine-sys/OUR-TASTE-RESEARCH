name: 월별 아카이브 검증 (수동 전용)

# ⚠️ 2026-07 변경: 매달 말일 news.json을 통째로 복사하던 기존 방식은 폐지.
# 이제 collect.py가 매일 수집 시점에 살아있는 기사를 발행월 기준
# data/archive/{YYYY}/news_{YYYY}_{MM}.json 에 바로 누적 저장함 (30일 컷 적용 전).
# → 말일에 news.json(이미 30일 컷 적용된 상태)을 복사하면 오히려
#   그동안 잘 쌓인 아카이브를 잘린 데이터로 덮어써버리는 역효과가 나서 자동 실행은 제거함.
# 아래는 수동으로 돌려서 이번 달 아카이브가 정상 누적됐는지 건수만 확인하는 용도.

on:
  workflow_dispatch:  # 수동 실행만

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 이번 달 아카이브 건수 확인
        run: |
          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")
          ARCHIVE_FILE="data/archive/${YEAR}/news_${YEAR}_${MONTH}.json"

          if [ -f "$ARCHIVE_FILE" ]; then
            echo "아카이브 파일: $ARCHIVE_FILE"
            python3 -c "import json; d=json.load(open('$ARCHIVE_FILE')); print(f'총 {d[\"total\"]}건 (최종 갱신: {d[\"updated\"]})')"
          else
            echo "!! 아직 이번 달 아카이브 파일이 없습니다: $ARCHIVE_FILE"
            echo "!! collect.py가 최소 1회는 실행돼야 생성됩니다."
          fi
