<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>우리맛 연구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #F5F5F7;
  --surface:  #FFFFFF;
  --border:   #E5E5EA;
  --text:     #1D1D1F;
  --text2:    #6E6E73;
  --text3:    #AEAEB2;
  --blue:     #0066FF;
  --blue-bg:  #EBF2FF;
  --radius:   14px;
  --shadow:   0 1px 8px rgba(0,0,0,.07);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);

  --c-new:   #34C759; --cb-new:   #F0FBF2;
  --c-trend: #AF52DE; --cb-trend: #F8F0FF;
  --c-cvs:   #FF9500; --cb-cvs:   #FFF8EB;
  --c-hm:    #007AFF; --cb-hm:    #EBF4FF;
  --c-ing:   #FF6B35; --cb-ing:   #FFF2EE;
  --c-ind:   #8E8E93; --cb-ind:   #F2F2F7;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ════════════════════════════════════
   PC LAYOUT  (768px+)
   ════════════════════════════════════ */
@media(min-width:768px){

  /* PC 헤더 */
  .pc-header{
    position:sticky;top:0;z-index:100;
    background:rgba(255,255,255,.88);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--border);
  }
  .pc-header-inner{
    max-width:1320px;margin:0 auto;
    padding:0 32px;height:60px;
    display:flex;align-items:center;gap:16px;
  }
  .pc-logo{font-size:18px;font-weight:700;letter-spacing:-.5px;flex-shrink:0}
  .pc-logo-sub{font-size:10px;color:var(--blue);font-weight:600;letter-spacing:.8px;margin-top:1px}
  .pc-logo-wrap{display:flex;flex-direction:column;gap:0;flex-shrink:0}
  .pc-search{
    flex:1;max-width:360px;margin-left:auto;
    display:flex;align-items:center;gap:8px;
    background:var(--bg);border-radius:10px;
    padding:0 14px;height:36px;
  }
  .pc-search input{background:none;border:none;outline:none;font-family:inherit;font-size:14px;color:var(--text);width:100%}
  .pc-search input::placeholder{color:var(--text3)}
  .pc-search svg{color:var(--text3);flex-shrink:0}
  .pc-upd{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
  .pc-ref-btn{
    width:34px;height:34px;border-radius:50%;
    background:var(--bg);display:flex;align-items:center;justify-content:center;
    color:var(--text2);transition:background .15s;flex-shrink:0
  }
  .pc-ref-btn:hover{background:var(--border)}
  .pc-ref-btn.spin svg{animation:rot .5s linear infinite}

  /* PC 바디 */
  .pc-body{
    max-width:1320px;margin:0 auto;
    padding:28px 32px 60px;
    display:grid;
    grid-template-columns:220px 1fr;
    gap:24px;
    align-items:start;
  }

  /* PC 사이드바 */
  .pc-sidebar{
    position:sticky;top:88px;
    display:flex;flex-direction:column;gap:8px;
  }
  .sidebar-section{
    background:var(--surface);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow);
  }
  .sidebar-title{
    font-size:11px;font-weight:700;color:var(--text3);
    letter-spacing:.5px;text-transform:uppercase;
    margin-bottom:10px;
  }
  .sidebar-cat{
    display:flex;flex-direction:column;gap:2px;
  }
  .s-cat-btn{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px;border-radius:9px;
    font-size:14px;font-weight:500;color:var(--text2);
    transition:all .15s;text-align:left;width:100%;
  }
  .s-cat-btn:hover{background:var(--bg);color:var(--text)}
  .s-cat-btn.on{background:var(--blue-bg);color:var(--blue);font-weight:600}
  .s-cat-btn .s-n{
    font-size:11px;font-weight:600;
    background:var(--bg);color:var(--text3);
    padding:1px 7px;border-radius:20px;
  }
  .s-cat-btn.on .s-n{background:var(--blue);color:#fff}

  .sidebar-filters{display:flex;flex-direction:column;gap:6px}
  .sf-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.3px;margin-bottom:2px}
  .sf-pills{display:flex;flex-wrap:wrap;gap:5px}
  .sf-pill{
    font-size:12px;font-weight:500;
    padding:4px 10px;border-radius:20px;
    border:1.5px solid var(--border);color:var(--text2);
    background:var(--surface);transition:all .15s;
  }
  .sf-pill:hover{border-color:var(--text3);color:var(--text)}
  .sf-pill.on{background:var(--text);border-color:var(--text);color:#fff}
  .sf-pill.on-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
  .sf-select{
    font-family:inherit;font-size:12px;color:var(--text2);
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:8px;padding:5px 8px;outline:none;cursor:pointer;width:100%;
  }
  .sf-select:focus{border-color:var(--blue)}
  .read-toggle-btn{
    width:100%;padding:8px;border-radius:9px;
    font-size:13px;font-weight:500;color:var(--text2);
    background:var(--bg);transition:all .15s;text-align:center;
  }
  .read-toggle-btn:hover{color:var(--text)}
  .read-toggle-btn.on{background:var(--blue-bg);color:var(--blue)}

  /* PC 메인 */
  .pc-main{}
  .date-group{margin-bottom:28px}
  .dg-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .dg-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
  .dg-line{flex:1;height:1px;background:var(--border)}
  .dg-count{font-size:11px;color:var(--text3)}
  .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

  /* 숨김 처리 */
  .mobile-header,.mobile-filter,.bottom-nav{display:none !important}
}

/* ════════════════════════════════════
   MOBILE LAYOUT  (~767px)
   ════════════════════════════════════ */
@media(max-width:767px){

  /* 모바일 헤더 */
  .mobile-header{
    position:sticky;top:0;z-index:100;
    background:rgba(255,255,255,.88);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--border);
    padding-top:env(safe-area-inset-top);
  }
  .mh-inner{
    display:flex;align-items:center;gap:10px;
    padding:0 16px;height:52px;
  }
  .mh-logo{font-size:16px;font-weight:700;letter-spacing:-.5px;flex-shrink:0}
  .mh-search{
    flex:1;display:flex;align-items:center;gap:7px;
    background:var(--bg);border-radius:10px;
    padding:0 11px;height:34px;
  }
  .mh-search input{background:none;border:none;outline:none;font-family:inherit;font-size:14px;color:var(--text);width:100%}
  .mh-search input::placeholder{color:var(--text3)}
  .mh-ref-btn{
    width:32px;height:32px;border-radius:50%;
    background:var(--bg);display:flex;align-items:center;justify-content:center;
    color:var(--text2);flex-shrink:0;
  }
  .mh-ref-btn.spin svg{animation:rot .5s linear infinite}

  /* 모바일 필터 */
  .mobile-filter{
    background:var(--surface);border-bottom:1px solid var(--border);
    overflow-x:auto;scrollbar-width:none;
  }
  .mobile-filter::-webkit-scrollbar{display:none}
  .mf-inner{
    display:flex;align-items:center;gap:6px;
    padding:8px 16px;white-space:nowrap;
  }
  .mf-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
  .mf-pill{
    font-size:12px;font-weight:500;
    padding:4px 11px;border-radius:20px;
    border:1.5px solid var(--border);color:var(--text2);
    background:var(--surface);flex-shrink:0;transition:all .15s;
  }
  .mf-pill.on{background:var(--text);border-color:var(--text);color:#fff}
  .mf-pill.on-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
  .mf-select{
    font-family:inherit;font-size:12px;color:var(--text2);
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:20px;padding:4px 10px;outline:none;flex-shrink:0;
  }

  /* 모바일 메인 */
  .pc-header,.pc-body{display:none !important}
  .mobile-main{padding:12px 16px 90px}
  .date-group{margin-bottom:20px}
  .dg-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .dg-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
  .dg-line{flex:1;height:1px;background:var(--border)}
  .dg-count{font-size:11px;color:var(--text3)}
  .cards-grid{display:flex;flex-direction:column;gap:8px}

  /* 하단 탭바 */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--border);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bn-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:3px;padding:8px 4px 6px;
    font-size:10px;font-weight:500;color:var(--text3);
    transition:color .15s;
  }
  .bn-tab.on{color:var(--blue)}
  .bn-dot{
    width:4px;height:4px;border-radius:50%;
    background:transparent;margin-top:-2px;transition:background .15s;
  }
  .bn-tab.on .bn-dot{background:var(--blue)}
}

/* ════════════════════════════════════
   SHARED CARD STYLES
   ════════════════════════════════════ */
.card{
  background:var(--surface);border-radius:var(--radius);
  padding:16px;cursor:pointer;
  box-shadow:var(--shadow);border:none;
  width:100%;text-align:left;display:block;
  transition:transform .15s,box-shadow .15s;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card:active{transform:scale(.99)}
.card.read{opacity:.42}

.card-top{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.1px}
.b-신제품      {color:var(--c-new);  background:var(--cb-new)}
.b-트렌드      {color:var(--c-trend);background:var(--cb-trend)}
.b-편의점      {color:var(--c-cvs);  background:var(--cb-cvs)}
.b-간편식      {color:var(--c-hm);   background:var(--cb-hm)}
.b-식재료·원료 {color:var(--c-ing);  background:var(--cb-ing)}
.b-업계뉴스    {color:var(--c-ind);  background:var(--cb-ind)}

.lang-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-ko{background:#34C759}.dot-en{background:#007AFF}.dot-ja{background:#FF3B30}
.card-src{font-size:12px;color:var(--text3);font-weight:500}
.card-date{font-size:12px;color:var(--text3);margin-left:auto}

.card-title{
  font-size:15px;font-weight:600;line-height:1.5;color:var(--text);
  margin-bottom:6px;word-break:keep-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card.read .card-title{color:var(--text2)}
.card-bullets{list-style:none;padding:0;margin:0 0 8px;display:flex;flex-direction:column;gap:3px}
.card-bullets li{font-size:12px;color:var(--text2);line-height:1.5;padding-left:12px;position:relative}
.card-bullets li::before{content:"·";position:absolute;left:0;color:var(--text3);font-weight:700}
.card-summary{
  font-size:13px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:10px;
}
.card-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--bg);
}
.unread-badge{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.card.read .unread-badge{background:transparent;border:1.5px solid var(--border)}
.card-link{color:var(--text3);display:flex;align-items:center;transition:color .15s}
.card:hover .card-link{color:var(--blue)}

.keywords{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.kw{font-size:11px;background:var(--bg);color:var(--text3);padding:2px 9px;border-radius:20px;border:1px solid var(--border);font-weight:500}

/* empty */
.empty{text-align:center;padding:64px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--text2);margin-bottom:6px}

@keyframes rot{to{transform:rotate(360deg)}}


/* ════════════════════════════════════
   SIGNAL TAB
   ════════════════════════════════════ */

/* PC 뷰 전환 */
.view-news { display: block; }
.view-signal { display: none; }
body.signal-mode .view-news { display: none; }
body.signal-mode .view-signal { display: block; }

/* PC 사이드바 뷰 버튼 */
.view-toggle {
  display: flex; gap: 4px;
  background: var(--bg); border-radius: 10px;
  padding: 3px; margin-bottom: 12px;
}
.vt-btn {
  flex: 1; padding: 7px 0;
  font-size: 12px; font-weight: 600;
  border-radius: 7px; color: var(--text3);
  transition: all .15s; text-align: center;
}
.vt-btn.on { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

/* 시그널 헤더 */
.signal-header { margin-bottom: 20px; }
.signal-period {
  display: flex; gap: 6px; margin-bottom: 16px;
}
.sp-pill {
  font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--border); color: var(--text3);
  background: var(--surface); transition: all .15s;
}
.sp-pill.on { background: var(--text); border-color: var(--text); color: #fff; }

/* 시그널 단계 필터 */
.signal-stage-filter {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.ss-btn {
  font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  border: 1.5px solid var(--border); color: var(--text3);
  background: var(--surface); transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.ss-btn.on-trend  { background: #FFF0F0; border-color: #FF3B30; color: #FF3B30; }
.ss-btn.on-watch  { background: #FFF8EB; border-color: #FF9500; color: #FF6A00; }
.ss-btn.on-interest{ background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.ss-btn.on-all    { background: var(--text); border-color: var(--text); color: #fff; }

/* 시그널 설명 */
.signal-legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 12px 16px; background: var(--surface);
  border-radius: 10px; margin-bottom: 20px;
  border: 1px solid var(--border);
}
.sl-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.sl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sl-dot-trend { background: #FF3B30; }
.sl-dot-watch { background: #FF9500; }
.sl-dot-interest { background: var(--blue); }

/* 시그널 아이템 */
.signal-list { display: flex; flex-direction: column; gap: 8px; }
.signal-item {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px 18px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
  border-left: 4px solid transparent;
  transition: box-shadow .15s, transform .15s;
  cursor: default;
}
.signal-item:hover { box-shadow: var(--shadow-md); transform: translateX(2px); }
.signal-item.s-trend   { border-left-color: #FF3B30; }
.signal-item.s-watch   { border-left-color: #FF9500; }
.signal-item.s-interest{ border-left-color: var(--blue); }

.si-rank {
  font-size: 13px; font-weight: 700; color: var(--text3);
  width: 24px; text-align: center; flex-shrink: 0;
}
.si-body { flex: 1; min-width: 0; }
.si-keyword {
  font-size: 16px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.si-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.si-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}
.si-badge-trend    { background: #FFF0F0; color: #FF3B30; }
.si-badge-watch    { background: #FFF8EB; color: #FF6A00; }
.si-badge-interest { background: var(--blue-bg); color: var(--blue); }
.si-sources { font-size: 11px; color: var(--text3); }
.si-right { text-align: right; flex-shrink: 0; }
.si-score {
  font-size: 20px; font-weight: 700; color: var(--text);
  line-height: 1;
}
.si-score-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
.si-bar-wrap { width: 80px; height: 4px; background: var(--bg); border-radius: 2px; margin-top: 6px; }
.si-bar { height: 100%; border-radius: 2px; transition: width .4s; }
.s-trend   .si-bar { background: #FF3B30; }
.s-watch   .si-bar { background: #FF9500; }
.s-interest .si-bar { background: var(--blue); }

/* 시그널 출처 태그 */
.si-src-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.si-src-tag {
  font-size: 10px; color: var(--text3);
  background: var(--bg); border: 1px solid var(--border);
  padding: 1px 7px; border-radius: 10px;
}

/* 모바일 시그널 */
@media(max-width:767px){
  .view-news,.view-signal { display: block !important; }
  body.signal-mode .view-news { display: none !important; }
  body.signal-mode .view-signal { display: block !important; }
  .mobile-main.view-signal { padding: 12px 16px 90px; }
  .signal-item { padding: 12px 14px; gap: 10px; }
  .si-score { font-size: 17px; }
  .si-bar-wrap { width: 60px; }
}

/* scroll top (PC only) */
.scroll-top{
  position:fixed;bottom:28px;right:28px;z-index:50;
  width:40px;height:40px;border-radius:50%;
  background:var(--text);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  opacity:0;transition:opacity .2s,transform .2s;transform:translateY(10px);
}
.scroll-top.show{opacity:1;transform:translateY(0)}
@media(max-width:767px){.scroll-top{display:none}}
</style>
</head>
<body>

<!-- ═══ PC 헤더 ═══ -->
<div class="pc-header">
<div class="pc-header-inner">
  <div class="pc-logo-wrap">
    <div class="pc-logo">우리맛 연구</div>
    <div class="pc-logo-sub">OUR TASTE RESEARCH</div>
  </div>
  <div class="pc-search">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="pc-q" type="text" placeholder="기사 검색">
  </div>
  <span class="pc-upd" id="pc-upd"></span>
  <button class="pc-ref-btn" id="pc-ref" onclick="loadNews()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
  </button>
</div>
</div>

<!-- ═══ PC 바디 ═══ -->
<div class="pc-body">

  <!-- PC 사이드바 -->
  <aside class="pc-sidebar">
    <div class="sidebar-section">
      <div class="view-toggle">
        <button class="vt-btn on" id="vt-news" onclick="setView('news')">📰 뉴스</button>
        <button class="vt-btn" id="vt-signal" onclick="setView('signal')">📡 시그널</button>
      </div>

<script>
const CATS=['전체','신제품','트렌드','편의점','간편식','식재료·원료','업계뉴스'];
const CAT_ICONS={'전체':'🗂️','신제품':'✨','트렌드':'📈','편의점':'🏪','간편식':'🍱','식재료·원료':'🌿','업계뉴스':'📰'};
let all=[],tab='전체',period=7,lang='all',src='all',query='',hideRead=false;

const isMobile=()=>window.innerWidth<768;

const READ_KEY='urimat_read_v1';
function getRead(){try{return new Set(JSON.parse(localStorage.getItem(READ_KEY)||'[]'))}catch{return new Set()}}
function markRead(id){try{const s=getRead();s.add(id);localStorage.setItem(READ_KEY,JSON.stringify([...s]))}catch{}}
function isRead(id){return getRead().has(id)}

function fmtDate(iso){
  try{
    const d=new Date(iso);
    const M=String(d.getMonth()+1).padStart(2,'0');
    const D=String(d.getDate()).padStart(2,'0');
    const h=d.getHours();
    const mm=String(d.getMinutes()).padStart(2,'0');
    return `${M}.${D} ${h<12?'오전':'오후'} ${String(h%12||12)}:${mm}`;
  }catch{return ''}
}
function dayKey(iso){
  try{
    const d=new Date(iso),now=new Date();
    const diff=Math.floor((now.setHours(0,0,0,0)-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);
    if(diff===0)return '오늘';if(diff===1)return '어제';return diff+'일 전';
  }catch{return '기타'}
}
function fmtUpd(iso){try{return new Date(iso).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+' 수집'}catch{return ''}}
function withinPeriod(iso){return period===0||(Date.now()-new Date(iso))/86400000<period}

function filtered(){
  let r=all;
  if(tab!=='전체')r=r.filter(a=>(a.categories||[a.category]).includes(tab));
  if(lang!=='all')r=r.filter(a=>a.lang===lang);
  if(src!=='all')r=r.filter(a=>a.source===src);
  if(period>0)r=r.filter(a=>withinPeriod(a.date));
  if(query){const lq=query.toLowerCase();r=r.filter(a=>a.title.toLowerCase().includes(lq)||(a.source||'').toLowerCase().includes(lq));}
  if(hideRead)r=r.filter(a=>!isRead(a.id));
  return r;
}

function catCounts(){
  const base=all.filter(a=>{
    if(lang!=='all'&&a.lang!==lang)return false;
    if(src!=='all'&&a.source!==src)return false;
    return withinPeriod(a.date);
  });
  const cnt={};
  for(const a of base)for(const c of (a.categories||[a.category||'업계뉴스']))cnt[c]=(cnt[c]||0)+1;
  return{cnt,total:base.length};
}

// PC 사이드바 카테고리
function renderPcCats(){
  const{cnt,total}=catCounts();
  document.getElementById('pc-cats').innerHTML=CATS.map(c=>{
    const n=c==='전체'?total:(cnt[c]||0);
    if(c!=='전체'&&n===0)return '';
    return `<button class="s-cat-btn ${c===tab?'on':''}" onclick="setTab('${c}')">${c}<span class="s-n">${n}</span></button>`;
  }).join('');
}

// 모바일 하단 탭바
function renderBottomNav(){
  const{cnt,total}=catCounts();
  const visible=CATS.filter(c=>c==='전체'||(cnt[c]||0)>0).slice(0,5);
  document.getElementById('bottom-nav').innerHTML=visible.map(c=>{
    const n=c==='전체'?total:(cnt[c]||0);
    return `<button class="bn-tab ${c===tab?'on':''}" onclick="setTab('${c}')">
      <span style="font-size:18px">${CAT_ICONS[c]||'📄'}</span>
      <span>${c}</span>
      <div class="bn-dot"></div>
    </button>`;
  }).join('');
}

function renderSrcSel(){
  const sources=[...new Set(all.map(a=>a.source))].sort();
  const opts='<option value="all">전체</option>'+sources.map(s=>`<option value="${s}"${src===s?' selected':''}>${s}</option>`).join('');
  document.getElementById('pc-src').innerHTML=opts;
  document.getElementById('mo-src').innerHTML='<option value="all">전체 출처</option>'+sources.map(s=>`<option value="${s}"${src===s?' selected':''}>${s}</option>`).join('');
}

function groupedHtml(items){
  if(!items.length)return`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">기사가 없습니다</div><div>다른 필터를 선택해보세요</div></div>`;
  const groups={};
  for(const a of items){const k=dayKey(a.date);if(!groups[k])groups[k]=[];groups[k].push(a);}
  const ORDER=['오늘','어제','2일 전','3일 전','4일 전','5일 전','6일 전'];
  const keys=Object.keys(groups).sort((a,b)=>{const ai=ORDER.indexOf(a),bi=ORDER.indexOf(b);if(ai>=0&&bi>=0)return ai-bi;if(ai>=0)return -1;if(bi>=0)return 1;return parseInt(a)-parseInt(b);});
  return keys.map(k=>`
    <div class="date-group">
      <div class="dg-header"><span class="dg-title">${k}</span><div class="dg-line"></div><span class="dg-count">${groups[k].length}건</span></div>
      <div class="cards-grid">${groups[k].map((a,i)=>cardHtml(a,i)).join('')}</div>
    </div>`).join('');
}

function renderMain(){
  const items=filtered();
  const html=groupedHtml(items);
  document.getElementById('pc-main').innerHTML=html;
  document.getElementById('mo-main').innerHTML=html;
}

function cardHtml(a,i){
  const cats=a.categories||[a.category||'업계뉴스'];
  const read=isRead(a.id);
  const badges=cats.map(c=>`<span class="badge b-${c}">${c}</span>`).join('');
  let sum = '';
  if(a.summary){
    if(Array.isArray(a.summary)){
      sum = `<ul class="card-bullets">${a.summary.map(s=>`<li>${s}</li>`).join('')}</ul>`;
    } else {
      sum = `<div class="card-summary">${a.summary}</div>`;
    }
  }
  const kws=(a.keywords&&a.keywords.length)?`<div class="keywords">${a.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>`:'';
  return `<button class="card${read?' read':''}" data-id="${a.id}" data-url="${a.url||''}" onclick="handleClick(this)">
  <div class="card-top">${badges}<span class="lang-dot dot-${a.lang||'ko'}"></span><span class="card-src">${a.source}</span><span class="card-date">${fmtDate(a.date)}</span></div>
  <div class="card-title">${a.title}</div>
  ${sum}
  ${kws}
  <div class="card-bottom"><div class="unread-badge"></div><svg class="card-link" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div>
</button>`;
}

function handleClick(el){
  const id=el.dataset.id,url=el.dataset.url;
  markRead(id);el.classList.add('read');
  el.querySelector('.unread-badge').style.cssText='background:transparent;border:1.5px solid var(--border)';
  if(url&&url!=='#')window.open(url,'_blank','noopener');
}

function renderAll(){
  renderPcCats();
  renderBottomNav();
  renderSrcSel();
  renderMain();
}

function setTab(c){tab=c;renderAll();}
function setPeriod(d){
  period=d;
  document.querySelectorAll('[data-d]').forEach(p=>p.classList.toggle('on',+p.dataset.d===d));
  renderAll();
}
function setLang(l){
  lang=l;
  document.querySelectorAll('[data-l]').forEach(p=>{
    p.classList.remove('on','on-blue');
    if(p.dataset.l===l)p.classList.add(l==='all'?'on-blue':'on');
  });
  renderAll();
}
function setSrc(v){src=v;renderAll();}
function toggleRead(){
  hideRead=!hideRead;
  ['pc-read-btn'].forEach(id=>{
    const btn=document.getElementById(id);
    if(btn){btn.classList.toggle('on',hideRead);btn.textContent=hideRead?'읽은 것 보이기':'읽은 것 숨기기';}
  });
  renderMain();
}


// ════════════════════════════════════
// SIGNAL ENGINE
// ════════════════════════════════════

let currentView = 'news';   // 'news' | 'signal'
let signalPeriod = 90;      // days
let signalStage = 'all';    // 'all'|'trend'|'watch'|'interest'

// 점수 = 빈도 × 출처다양성
// 트렌드:  출처 6개+ AND 빈도 10+  (score 60+)
// 주목:    출처 3개+ AND 빈도 5+   (score 15+)
// 관심사:  출처 2개+ AND 빈도 3+   (score 6+)

// ── 시그널 불용어 (의미 없는 일반 단어) ──────────────────
const SIGNAL_STOPWORDS = new Set([
  // 행위/이벤트 동사형
  '출시','오픈','개최','강화','확대','론칭','진행','도입','시작','운영',
  '출범','선보','선봬','선보여','선보임','시행','실시','추진','구축','마련',
  // 업계 공통 일반명사
  '신제품','제품','브랜드','매장','업체','기업','회사','소비자','시장','업계',
  '관계자','대표','임원','관련','사업','서비스','플랫폼','솔루션','파트너',
  // F&B 업계 기본 단어
  '식품','외식','음식','요리','식재료','메뉴','레시피','음료','주류',
  // 시간/수량 표현
  '올해','최근','이번','지난','역대','증가','감소','성장','하락','상승',
  '전년','분기','상반기','하반기','연간','월간','주간',
  // 수식어
  '최초','최대','글로벌','국내','해외','신규','새로운','다양한','본격',
  '적극','지속','꾸준','대규모','소규모','프리미엄','스페셜',
  // 영문 일반어
  'New','The','This','That','For','With','And','Food','Brand',
  'Product','Market','Launch','Company','Group','Korea',
]);

function calcSignals(days) {
  const cutoff = Date.now() - days * 86400000;
  const kwMap = {}; // keyword → { freq, sources: Set }

  for (const a of all) {
    if (new Date(a.date).getTime() < cutoff) continue;
    const kws = Array.isArray(a.keywords) ? a.keywords : [];
    // 제목에서도 단어 추출
    const titleKws = (a.title || '').match(/[가-힣]{2,6}|[A-Z][A-Za-z]{2,}/g) || [];
    const allKws = [...new Set([...kws, ...titleKws])];
    for (const k of allKws) {
      if (!k || k.length < 2) continue;
      if (SIGNAL_STOPWORDS.has(k)) continue;  // 불용어 제외
      if (!kwMap[k]) kwMap[k] = { freq: 0, sources: new Set() };
      kwMap[k].freq++;
      kwMap[k].sources.add(a.source);
    }
  }

  // 점수 계산 + 필터링
  const results = [];
  for (const [kw, data] of Object.entries(kwMap)) {
    const srcCount = data.sources.size;
    const freq = data.freq;
    const score = freq * srcCount;
    let stage = null;
    if (srcCount >= 6 && freq >= 10) stage = 'trend';
    else if (srcCount >= 3 && freq >= 5) stage = 'watch';
    else if (srcCount >= 2 && freq >= 3) stage = 'interest';
    if (!stage) continue;
    results.push({ kw, freq, srcCount, score, stage, sources: [...data.sources].slice(0, 5) });
  }

  results.sort((a, b) => b.score - a.score);
  return results;
}

function stageLabel(s) {
  if (s === 'trend')    return ['🔥 트렌드', 'si-badge-trend'];
  if (s === 'watch')    return ['👀 주목',   'si-badge-watch'];
  return                       ['💡 관심사', 'si-badge-interest'];
}

function renderSignal() {
  const signals = calcSignals(signalPeriod);
  const filtered = signalStage === 'all' ? signals : signals.filter(s => s.stage === signalStage);
  const maxScore = filtered[0]?.score || 1;

  const html = !filtered.length
    ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">해당 시그널이 없습니다</div><div>기간을 늘리거나 더 많은 기사를 수집해보세요</div></div>`
    : `<div class="signal-legend">
        <div class="sl-item"><div class="sl-dot sl-dot-trend"></div>트렌드: 6개+ 매체 · 10회+</div>
        <div class="sl-item"><div class="sl-dot sl-dot-watch"></div>주목: 3개+ 매체 · 5회+</div>
        <div class="sl-item"><div class="sl-dot sl-dot-interest"></div>관심사: 2개+ 매체 · 3회+</div>
      </div>
      <div class="signal-list">${filtered.slice(0, 50).map((s, i) => {
        const [label, badgeCls] = stageLabel(s.stage);
        const barPct = Math.round(s.score / maxScore * 100);
        const srcTags = s.sources.map(src => `<span class="si-src-tag">${src}</span>`).join('');
        return `<div class="signal-item s-${s.stage}">
          <div class="si-rank">${i + 1}</div>
          <div class="si-body">
            <div class="si-keyword">${s.kw}</div>
            <div class="si-meta">
              <span class="si-badge ${badgeCls}">${label}</span>
              <span class="si-sources">${s.srcCount}개 매체 · ${s.freq}회</span>
            </div>
            <div class="si-src-tags">${srcTags}</div>
          </div>
          <div class="si-right">
            <div class="si-score">${s.score}</div>
            <div class="si-score-label">시그널 점수</div>
            <div class="si-bar-wrap"><div class="si-bar" style="width:${barPct}%"></div></div>
          </div>
        </div>`;
      }).join('')}</div>`;

  document.getElementById('pc-signal').innerHTML = html;
  if (document.getElementById('mo-signal')) document.getElementById('mo-signal').innerHTML = html;
}

function setView(v) {
  currentView = v;
  document.body.classList.toggle('signal-mode', v === 'signal');
  document.getElementById('vt-news').classList.toggle('on', v === 'news');
  document.getElementById('vt-signal').classList.toggle('on', v === 'signal');
  // 모바일 layout
  applyLayout();
  if (v === 'signal') renderSignal();
}

function setSignalPeriod(d) {
  const wrap = document.getElementById('custom-period-wrap');
  if (d === 'custom') {
    document.querySelectorAll('[data-sp]').forEach(p => p.classList.toggle('on', p.dataset.sp === 'custom'));
    if (wrap) wrap.style.display = 'block';
    return;
  }
  if (wrap) wrap.style.display = 'none';
  signalPeriod = d;
  document.querySelectorAll('[data-sp]').forEach(p => p.classList.toggle('on', +p.dataset.sp === d));
  renderSignal();
}

function applyCustomPeriod() {
  const val = parseInt(document.getElementById('custom-period-input').value);
  if (!val || val < 1) return;
  signalPeriod = Math.min(val, 365);
  renderSignal();
}

function setSignalStage(s) {
  signalStage = s;
  document.querySelectorAll('[data-ss]').forEach(b => {
    b.classList.remove('on-all','on-trend','on-watch','on-interest');
    if (b.dataset.ss === s) b.classList.add(`on-${s}`);
  });
  renderSignal();
}

// 모바일/PC 메인 표시 전환
function applyLayout(){
  const mo=isMobile();
  const isSignal = currentView==='signal';
  document.getElementById('mo-main').style.display=(!isSignal&&mo)?'block':'none';
  const moSig=document.getElementById('mo-signal');
  if(moSig) moSig.style.display=(isSignal&&mo)?'block':'none';
}

async function loadNews(){
  ['pc-ref','mo-ref'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.add('spin');});
  try{
    const r=await fetch('data/news.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    all=d.articles||[];
    const upd=d.updated?fmtUpd(d.updated):'';
    const pe=document.getElementById('pc-upd');if(pe)pe.textContent=upd;
    applyLayout();
    renderAll();
    if(currentView==='signal') renderSignal();
  }catch(e){
    const err=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">불러올 수 없어요</div><div style="font-size:13px;margin-top:4px">${e.message}</div></div>`;
    document.getElementById('pc-main').innerHTML=err;
    document.getElementById('mo-main').innerHTML=err;
  }finally{
    ['pc-ref','mo-ref'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('spin');});
  }
}

// 검색 — PC / 모바일 각각
document.getElementById('pc-q').addEventListener('input',e=>{query=e.target.value.trim();renderMain();});
document.getElementById('mo-q').addEventListener('input',e=>{query=e.target.value.trim();renderMain();});

window.addEventListener('scroll',()=>document.getElementById('scroll-top').classList.toggle('show',scrollY>300));
window.addEventListener('resize',()=>{applyLayout();renderAll();});

applyLayout();
loadNews();
setInterval(loadNews,30*60*1000);
</script>
</body>
</html>
